# Render Blueprint para Pátio Veículos
# Documentação: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: patio-veiculos
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: API_PLACAS_TOKEN
        sync: false

# Observação: os bancos gerenciados do Render são PostgreSQL, mas este projeto
# usa MySQL. Provisione um MySQL externo (PlanetScale, Railway, etc.) e defina
# DATABASE_URL manualmente no dashboard (envVar com sync: false acima).
